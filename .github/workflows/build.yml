name: Build MyNotes APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O gradle.zip
          unzip -q gradle.zip
          sudo mv gradle-7.6 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

      - name: Copy index.html to assets
        run: cp index.html app/src/main/assets/index.html

      - name: Create app icons
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            convert -size 96x96 xc:#f0a500 \
              -fill white -pointsize 32 \
              -gravity center -annotate 0 'N' \
              app/src/main/res/mipmap-${dir}/ic_launcher.png 2>/dev/null || \
            printf '\x89PNG\r\n\x1a\n' > app/src/main/res/mipmap-${dir}/ic_launcher.png
          done

      - name: Create MainActivity.java
        run: |
          mkdir -p app/src/main/java/com/ammorshed/mynotes
          cat > app/src/main/java/com/ammorshed/mynotes/MainActivity.java << 'JAVAEOF'
          package com.ammorshed.mynotes;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setDatabaseEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ammorshed.mynotes">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="আমার নোট"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">আমার নোট</string>
          </resources>
          STREOF

      - name: Create network_security_config.xml
        run: |
          cat > app/src/main/res/xml/network_security_config.xml << 'NETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true"/>
          </network-security-config>
          NETEOF

      - name: Create app build.gradle
        run: |
          cat > app/build.gradle << 'GRADEOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.ammorshed.mynotes"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {}
          GRADEOF

      - name: Create root build.gradle
        run: |
          cat > build.gradle << 'ROOTEOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ROOTEOF

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'SETEOF'
          rootProject.name = "MyNotes"
          include ':app'
          SETEOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'PROPEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROPEOF

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          /opt/gradle/bin/gradle wrapper --gradle-version 7.6 --distribution-type bin
          chmod +x gradlew

      - name: Build Debug APK
        run: /opt/gradle/bin/gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MyNotes-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
