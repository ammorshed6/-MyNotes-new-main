<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>আমার নোট</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --accent: #f0a500;
    --accent2: #e05c00;
    --text: #e8eaf0;
    --text2: #9098b8;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --card: #1e2235;
    --border: #2a2f4a;
    --pin-bg: #161926;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== PIN SCREEN ===== */
  #pinScreen {
    position: fixed; inset: 0;
    background: var(--pin-bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  #pinScreen.hidden { display: none; }

  .pin-logo {
    font-size: 52px; margin-bottom: 8px;
  }
  .pin-title {
    font-size: 22px; font-weight: 700;
    color: var(--accent); margin-bottom: 4px;
  }
  .pin-subtitle {
    font-size: 13px; color: var(--text2);
    margin-bottom: 36px;
  }
  .pin-dots {
    display: flex; gap: 14px; margin-bottom: 32px;
  }
  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    transition: background 0.2s;
  }
  .pin-dot.filled { background: var(--accent); }

  .pin-error {
    font-size: 13px; color: var(--red);
    min-height: 18px; margin-bottom: 20px;
    text-align: center;
  }

  .pin-grid {
    display: grid; grid-template-columns: repeat(3, 72px);
    gap: 14px;
  }
  .pin-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 24px; font-weight: 600;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .pin-btn:active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(0.93); }
  .pin-btn .sub { font-size: 8px; color: var(--text2); letter-spacing: 1px; }
  .pin-btn.del { background: transparent; border-color: transparent; font-size: 20px; }
  .pin-btn.ok { background: var(--accent); color: #000; border-color: var(--accent); }

  .pin-setup-msg {
    font-size: 13px; color: var(--text2);
    margin-top: 20px; text-align: center;
  }

  /* ===== HEADER ===== */
  #appScreen { display: none; flex-direction: column; min-height: 100vh; }
  #appScreen.visible { display: flex; }

  .header {
    background: var(--bg2);
    padding: 12px 16px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 20px; font-weight: 700; color: var(--accent);
  }
  .header-title span.icon { font-size: 22px; }
  .watermark {
    background: #cc0000;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--bg3);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:active { background: var(--accent); color: #000; }

  /* Search */
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3);
    border-radius: 12px;
    padding: 8px 12px;
    border: 1px solid var(--border);
  }
  .search-box input {
    flex: 1; background: transparent;
    border: none; outline: none;
    color: var(--text); font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
  }
  .search-box input::placeholder { color: var(--text2); }

  /* Stats */
  .stats {
    display: flex; gap: 0;
    background: var(--bg2);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    flex: 1; text-align: center;
    padding: 4px 0;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* Category filter */
  .cat-filter {
    display: flex; gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cat-filter::-webkit-scrollbar { display: none; }
  .cat-chip {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 12px;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .cat-chip.active {
    background: var(--accent);
    color: #000; border-color: var(--accent);
    font-weight: 600;
  }

  /* Notes list */
  .notes-list {
    flex: 1;
    padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    padding-bottom: 80px;
  }

  .note-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    position: relative;
    transition: transform 0.15s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .note-card:active { transform: scale(0.98); }

  .note-card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px;
    margin-bottom: 6px;
  }
  .note-left { display: flex; align-items: flex-start; gap: 8px; flex: 1; }
  .pin-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2); margin-top: 6px; flex-shrink: 0;
    transition: background 0.2s;
  }
  .pin-indicator.pinned { background: var(--accent); }

  .note-title {
    font-size: 15px; font-weight: 600;
    color: var(--text); line-height: 1.3;
    flex: 1;
  }
  .note-menu-btn {
    background: none; border: none;
    color: var(--text2); font-size: 18px;
    cursor: pointer; padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .note-menu-btn:active { background: var(--bg3); }

  .note-preview {
    font-size: 13px; color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
    padding-left: 16px;
  }

  .note-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    padding-left: 16px;
  }
  .note-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text2);
  }
  .note-cat-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .note-actions { display: flex; gap: 8px; }
  .note-act-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--bg3);
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .note-act-btn:active { background: var(--accent); color: #000; }
  .note-act-btn.danger:active { background: var(--red); color: #fff; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 28px; font-weight: 300;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(240,165,0,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 200;
  }
  .fab:active { transform: scale(0.9); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 92vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 18px; font-weight: 700;
    color: var(--text); margin-bottom: 16px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 12px; color: var(--text2);
    margin-bottom: 6px; display: block;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: none; min-height: 130px; }
  .form-select option { background: var(--bg2); }

  .modal-btns {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .btn {
    flex: 1; padding: 12px;
    border-radius: 12px; border: none;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--bg3); color: var(--text2); }
  .btn:active { transform: scale(0.96); }

  /* View modal */
  .view-note-title {
    font-size: 20px; font-weight: 700;
    color: var(--accent); margin-bottom: 10px;
    line-height: 1.4;
  }
  .view-note-body {
    font-size: 14px; color: var(--text);
    line-height: 1.8; white-space: pre-wrap;
    background: var(--bg3);
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 14px;
    max-height: 50vh; overflow-y: auto;
  }
  .view-note-meta {
    font-size: 12px; color: var(--text2);
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  /* Dropdown menu */
  .dropdown {
    position: absolute; right: 14px; top: 44px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 300;
    min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 12px 16px;
    font-size: 14px; font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); color: var(--text);
    transition: background 0.15s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: var(--bg3); }
  .dropdown-item.danger { color: var(--red); }

  /* Confirm modal */
  .confirm-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .confirm-modal.open { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--bg2);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 300px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .confirm-box .emoji { font-size: 36px; margin-bottom: 10px; }
  .confirm-box h3 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
  .confirm-box p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-danger { background: var(--red); color: #fff; }

  /* Cat management */
  .cat-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .cat-list-item:last-child { border-bottom: none; }
  .cat-name { font-size: 14px; }
  .cat-del-btn {
    background: none; border: none;
    color: var(--red); font-size: 18px;
    cursor: pointer; padding: 4px 8px;
  }

  /* PIN change modal */
  .pin-change-input {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 20px; letter-spacing: 8px;
    text-align: center; outline: none;
    margin-bottom: 10px;
  }
  .pin-change-input:focus { border-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); color: var(--text);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-family: 'Hind Siliguri', sans-serif;
    border: 1px solid var(--border);
    z-index: 999; opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .no-data { text-align:center; color:var(--text2); padding:40px 16px; font-size:14px; }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen">
  <div class="pin-logo">📓</div>
  <div class="pin-title">আমার নোট</div>
  <div class="pin-subtitle" id="pinSubtitle">PIN দিন</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2<div class="sub">ABC</div></button>
    <button class="pin-btn" onclick="pinPress('3')">3<div class="sub">DEF</div></button>
    <button class="pin-btn" onclick="pinPress('4')">4<div class="sub">GHI</div></button>
    <button class="pin-btn" onclick="pinPress('5')">5<div class="sub">JKL</div></button>
    <button class="pin-btn" onclick="pinPress('6')">6<div class="sub">MNO</div></button>
    <button class="pin-btn" onclick="pinPress('7')">7<div class="sub">PQRS</div></button>
    <button class="pin-btn" onclick="pinPress('8')">8<div class="sub">TUV</div></button>
    <button class="pin-btn" onclick="pinPress('9')">9<div class="sub">WXYZ</div></button>
    <button class="pin-btn del" onclick="pinClear()">✕</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-setup-msg" id="pinSetupMsg"></div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <span class="icon">📓</span>
        আমার নোট
        <span class="watermark">@A.M.MORSHED</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openCatModal()" title="ক্যাটাগরি">🗂️</button>
        <button class="icon-btn" onclick="openPinChangeModal()" title="PIN">🔐</button>
      </div>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="নোট খুঁজুন..." oninput="renderNotes()">
    </div>
  </div>

  <div class="stats">
    <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-label">মোট নোট</div></div>
    <div class="stat-item"><div class="stat-num" id="statPinned">0</div><div class="stat-label">পিন করা</div></div>
    <div class="stat-item"><div class="stat-num" id="statToday">0</div><div class="stat-label">আজকের</div></div>
    <div class="stat-item"><div class="stat-num" id="statCats">0</div><div class="stat-label">ক্যাটাগরি</div></div>
  </div>

  <div class="cat-filter" id="catFilter"></div>

  <div class="notes-list" id="notesList"></div>

  <button class="fab" onclick="openAddModal()">+</button>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="noteModalTitle">নতুন নোট</div>
    <div class="form-group">
      <label class="form-label">শিরোনাম</label>
      <input type="text" class="form-input" id="noteTitle" placeholder="নোটের শিরোনাম লিখুন...">
    </div>
    <div class="form-group">
      <label class="form-label">বিস্তারিত</label>
      <textarea class="form-textarea" id="noteBody" placeholder="নোটের বিস্তারিত লিখুন..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">ক্যাটাগরি</label>
      <select class="form-select" id="noteCat"></select>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" id="notePin" style="width:18px;height:18px;accent-color:var(--accent);">
      <label for="notePin" style="font-size:14px;cursor:pointer;">📌 পিন করুন</label>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeNoteModal()">বাতিল</button>
      <button class="btn btn-primary" onclick="saveNote()">সংরক্ষণ</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="view-note-title" id="viewTitle"></div>
    <div class="view-note-body" id="viewBody"></div>
    <div class="view-note-meta" id="viewMeta"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="btn btn-secondary" onclick="closeViewModal()">বন্ধ করুন</button>
      <button class="btn btn-primary" onclick="editFromView()">✏️ এডিট</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">ক্যাটাগরি ব্যবস্থাপনা</div>
    <div class="form-group" style="display:flex;gap:8px;">
      <input type="text" class="form-input" id="newCatInput" placeholder="নতুন ক্যাটাগরি..." style="flex:1;">
      <button class="btn btn-primary" style="flex:0;padding:10px 16px;" onclick="addCategory()">+</button>
    </div>
    <div id="catListView"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeCatModal()">বন্ধ করুন</button>
    </div>
  </div>
</div>

<!-- PIN CHANGE MODAL -->
<div class="modal-overlay" id="pinChangeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">PIN পরিবর্তন</div>
    <div class="form-group">
      <label class="form-label">বর্তমান PIN</label>
      <input type="password" class="pin-change-input" id="oldPinInput" maxlength="4" inputmode="numeric" placeholder="••••">
    </div>
    <div class="form-group">
      <label class="form-label">নতুন PIN (৪ সংখ্যা)</label>
      <input type="password" class="pin-change-input" id="newPinInput" maxlength="4" inputmode="numeric" placeholder="••••">
    </div>
    <div class="form-group">
      <label class="form-label">নতুন PIN নিশ্চিত করুন</label>
      <input type="password" class="pin-change-input" id="confirmPinInput" maxlength="4" inputmode="numeric" placeholder="••••">
    </div>
    <div class="pin-error" id="pinChangeError"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closePinChangeModal()">বাতিল</button>
      <button class="btn btn-primary" onclick="savePin()">সংরক্ষণ</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <div class="emoji">🗑️</div>
    <h3>নোট মুছে ফেলবেন?</h3>
    <p>এই নোটটি চিরতরে মুছে যাবে।</p>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="closeConfirm()">না</button>
      <button class="btn btn-danger" onclick="confirmDelete()">হ্যাঁ, মুছুন</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Dropdown -->
<div class="dropdown" id="dropdown">
  <div class="dropdown-item" onclick="dropPin()">📌 পিন / আনপিন</div>
  <div class="dropdown-item" onclick="dropEdit()">✏️ এডিট</div>
  <div class="dropdown-item" onclick="dropCopy()">📋 কপি করুন</div>
  <div class="dropdown-item danger" onclick="dropDelete()">🗑️ মুছে ফেলুন</div>
</div>

<script>
// ===== DATA =====
let notes = JSON.parse(localStorage.getItem('mn_notes') || '[]');
let categories = JSON.parse(localStorage.getItem('mn_cats') || '["ব্যক্তিগত গুরুত্বপূর্ণ তথ্য","সাধারণ নোট"]');
let storedPin = localStorage.getItem('mn_pin') || '1234';

let currentFilter = 'সব';
let editingId = null;
let viewingId = null;
let dropdownNoteId = null;
let deleteNoteId = null;
let pinSetupStep = 0;
let pinBuffer = '';
let pinFirstEntry = '';

// ===== PIN LOGIC =====
function initPin() {
  const pin = localStorage.getItem('mn_pin');
  if (!pin) {
    // First time setup
    document.getElementById('pinSubtitle').textContent = 'নতুন PIN সেট করুন (৪ সংখ্যা)';
    document.getElementById('pinSetupMsg').textContent = '⚠️ প্রথমবার — আপনার PIN তৈরি করুন';
    pinSetupStep = 1;
  } else {
    document.getElementById('pinSubtitle').textContent = 'আপনার PIN দিন';
    pinSetupStep = 0;
  }
}

function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updateDots();
  if (pinBuffer.length === 4) {
    setTimeout(() => checkPin(), 200);
  }
}

function pinBack() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
}

function pinClear() {
  pinBuffer = '';
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinSetupStep === 1) {
    // Setting new PIN - first entry
    pinFirstEntry = pinBuffer;
    pinBuffer = '';
    updateDots();
    document.getElementById('pinSubtitle').textContent = 'আবার দিন নিশ্চিত করতে';
    document.getElementById('pinSetupMsg').textContent = '';
    pinSetupStep = 2;
    return;
  }
  if (pinSetupStep === 2) {
    // Setting new PIN - confirm
    if (pinBuffer === pinFirstEntry) {
      localStorage.setItem('mn_pin', pinBuffer);
      storedPin = pinBuffer;
      pinBuffer = '';
      updateDots();
      unlockApp();
    } else {
      shakeError('PIN মিলছে না! আবার চেষ্টা করুন।');
      pinBuffer = ''; pinFirstEntry = '';
      updateDots();
      pinSetupStep = 1;
      document.getElementById('pinSubtitle').textContent = 'নতুন PIN সেট করুন (৪ সংখ্যা)';
    }
    return;
  }
  // Normal login
  if (pinBuffer === storedPin) {
    unlockApp();
  } else {
    shakeError('ভুল PIN! আবার চেষ্টা করুন।');
    pinBuffer = '';
    updateDots();
  }
}

function shakeError(msg) {
  const el = document.getElementById('pinError');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 2500);
}

function unlockApp() {
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.add('visible');
  renderAll();
}

// ===== RENDER =====
function renderAll() {
  renderStats();
  renderCatFilter();
  renderNotes();
}

function renderStats() {
  const today = new Date().toDateString();
  document.getElementById('statTotal').textContent = notes.length;
  document.getElementById('statPinned').textContent = notes.filter(n => n.pinned).length;
  document.getElementById('statToday').textContent = notes.filter(n => new Date(n.date).toDateString() === today).length;
  document.getElementById('statCats').textContent = categories.length;
}

function renderCatFilter() {
  const all = ['সব', ...categories];
  const html = all.map(c => `
    <button class="cat-chip ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">
      ${c === 'সব' ? '📁' : '📝'} ${c}
    </button>
  `).join('');
  document.getElementById('catFilter').innerHTML = html;
}

function renderNotes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = notes.filter(n => {
    const matchCat = currentFilter === 'সব' || n.category === currentFilter;
    const matchQ = !q || n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  // Pinned first
  filtered.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return new Date(b.date) - new Date(a.date);
  });

  if (filtered.length === 0) {
    document.getElementById('notesList').innerHTML = `
      <div class="empty-state">
        <div class="emoji">📭</div>
        <p>কোনো নোট নেই</p>
      </div>`;
    return;
  }

  document.getElementById('notesList').innerHTML = filtered.map(n => `
    <div class="note-card" id="card_${n.id}">
      <div class="note-card-top">
        <div class="note-left">
          <div class="pin-indicator ${n.pinned ? 'pinned' : ''}"></div>
          <div class="note-title">${escHtml(n.title || 'শিরোনাম নেই')}</div>
        </div>
        <button class="note-menu-btn" onclick="openDropdown(event,'${n.id}')">⋮</button>
      </div>
      ${n.body ? `<div class="note-preview">${escHtml(n.body)}</div>` : ''}
      <div class="note-footer">
        <div class="note-meta">
          <span class="note-cat-badge">📝 ${escHtml(n.category)}</span>
          <span>${formatDate(n.date)}</span>
        </div>
        <div class="note-actions">
          <button class="note-act-btn" onclick="openViewModal('${n.id}')">👁️</button>
          <button class="note-act-btn" onclick="openEditModal('${n.id}')">✏️</button>
        </div>
      </div>
    </div>
  `).join('');

  renderStats();
}

function setFilter(cat) {
  currentFilter = cat;
  renderCatFilter();
  renderNotes();
}

// ===== NOTE CRUD =====
function openAddModal() {
  editingId = null;
  document.getElementById('noteModalTitle').textContent = 'নতুন নোট';
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  document.getElementById('notePin').checked = false;
  populateCatSelect();
  openModal('noteModal');
}

function openEditModal(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  editingId = id;
  document.getElementById('noteModalTitle').textContent = 'নোট এডিট';
  document.getElementById('noteTitle').value = n.title;
  document.getElementById('noteBody').value = n.body;
  document.getElementById('notePin').checked = n.pinned;
  populateCatSelect(n.category);
  openModal('noteModal');
}

function populateCatSelect(selected) {
  const sel = document.getElementById('noteCat');
  sel.innerHTML = categories.map(c =>
    `<option value="${escHtml(c)}" ${c === selected ? 'selected' : ''}>${escHtml(c)}</option>`
  ).join('');
}

function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  const body = document.getElementById('noteBody').value.trim();
  const cat = document.getElementById('noteCat').value;
  const pinned = document.getElementById('notePin').checked;

  if (!title && !body) { showToast('শিরোনাম বা বিস্তারিত লিখুন'); return; }

  if (editingId) {
    const idx = notes.findIndex(n => n.id === editingId);
    if (idx >= 0) {
      notes[idx] = { ...notes[idx], title, body, category: cat, pinned, updated: new Date().toISOString() };
    }
  } else {
    notes.unshift({
      id: Date.now().toString(),
      title, body,
      category: cat || (categories[0] || 'সাধারণ নোট'),
      pinned,
      date: new Date().toISOString(),
      updated: new Date().toISOString()
    });
  }

  saveData();
  closeNoteModal();
  renderAll();
  showToast(editingId ? 'নোট আপডেট হয়েছে ✓' : 'নোট সংরক্ষিত হয়েছে ✓');
}

function closeNoteModal() { closeModal('noteModal'); }

// ===== VIEW MODAL =====
function openViewModal(id) {
  const n = notes.find(x => x.id === id);
  if (!n) return;
  viewingId = id;
  document.getElementById('viewTitle').textContent = n.title || 'শিরোনাম নেই';
  document.getElementById('viewBody').textContent = n.body || '(বিস্তারিত নেই)';
  document.getElementById('viewMeta').innerHTML = `
    <span>📝 ${escHtml(n.category)}</span>
    <span>📅 ${formatDate(n.date)}</span>
    ${n.pinned ? '<span>📌 পিন করা</span>' : ''}
  `;
  openModal('viewModal');
}

function closeViewModal() { closeModal('viewModal'); viewingId = null; }

function editFromView() {
  closeViewModal();
  setTimeout(() => openEditModal(viewingId || ''), 100);
}

// ===== DROPDOWN =====
function openDropdown(e, id) {
  e.stopPropagation();
  dropdownNoteId = id;
  const dd = document.getElementById('dropdown');
  const card = document.getElementById('card_' + id);
  card.style.position = 'relative';
  card.appendChild(dd);
  dd.classList.add('open');
}

document.addEventListener('click', () => {
  document.getElementById('dropdown').classList.remove('open');
});

function dropPin() {
  const idx = notes.findIndex(n => n.id === dropdownNoteId);
  if (idx >= 0) {
    notes[idx].pinned = !notes[idx].pinned;
    saveData(); renderAll();
    showToast(notes[idx].pinned ? 'পিন করা হয়েছে 📌' : 'পিন সরানো হয়েছে');
  }
  document.getElementById('dropdown').classList.remove('open');
}

function dropEdit() {
  document.getElementById('dropdown').classList.remove('open');
  openEditModal(dropdownNoteId);
}

function dropCopy() {
  document.getElementById('dropdown').classList.remove('open');
  const n = notes.find(x => x.id === dropdownNoteId);
  if (!n) return;
  const text = (n.title ? n.title + '\n\n' : '') + (n.body || '');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('নোট কপি হয়েছে 📋');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    showToast('নোট কপি হয়েছে 📋');
  } catch(e) {
    showToast('কপি করা যায়নি');
  }
  document.body.removeChild(ta);
}

function dropDelete() {
  document.getElementById('dropdown').classList.remove('open');
  deleteNoteId = dropdownNoteId;
  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  deleteNoteId = null;
}

function confirmDelete() {
  notes = notes.filter(n => n.id !== deleteNoteId);
  saveData(); renderAll();
  closeConfirm();
  showToast('নোট মুছে ফেলা হয়েছে 🗑️');
}

// ===== CATEGORY MODAL =====
function openCatModal() {
  renderCatList();
  openModal('catModal');
}
function closeCatModal() { closeModal('catModal'); }

function renderCatList() {
  document.getElementById('catListView').innerHTML = categories.map((c, i) => `
    <div class="cat-list-item">
      <span class="cat-name">📝 ${escHtml(c)}</span>
      <button class="cat-del-btn" onclick="deleteCat(${i})">🗑️</button>
    </div>
  `).join('') || '<div class="no-data">কোনো ক্যাটাগরি নেই</div>';
}

function addCategory() {
  const val = document.getElementById('newCatInput').value.trim();
  if (!val) { showToast('ক্যাটাগরির নাম লিখুন'); return; }
  if (categories.includes(val)) { showToast('এই ক্যাটাগরি আগেই আছে'); return; }
  categories.push(val);
  document.getElementById('newCatInput').value = '';
  saveData(); renderCatList(); renderCatFilter();
  showToast('ক্যাটাগরি যোগ হয়েছে ✓');
}

function deleteCat(i) {
  const cat = categories[i];
  const inUse = notes.some(n => n.category === cat);
  if (inUse) { showToast('এই ক্যাটাগরি নোটে ব্যবহৃত — মুছতে পারবেন না'); return; }
  categories.splice(i, 1);
  saveData(); renderCatList(); renderCatFilter();
  showToast('ক্যাটাগরি মুছে ফেলা হয়েছে');
}

// ===== PIN CHANGE =====
function openPinChangeModal() { openModal('pinChangeModal'); }
function closePinChangeModal() {
  closeModal('pinChangeModal');
  document.getElementById('oldPinInput').value = '';
  document.getElementById('newPinInput').value = '';
  document.getElementById('confirmPinInput').value = '';
  document.getElementById('pinChangeError').textContent = '';
}

function savePin() {
  const old = document.getElementById('oldPinInput').value;
  const n = document.getElementById('newPinInput').value;
  const c = document.getElementById('confirmPinInput').value;
  const err = document.getElementById('pinChangeError');

  if (old !== storedPin) { err.textContent = 'বর্তমান PIN ভুল!'; return; }
  if (n.length !== 4 || !/^\d{4}$/.test(n)) { err.textContent = 'নতুন PIN ৪ সংখ্যার হতে হবে!'; return; }
  if (n !== c) { err.textContent = 'নতুন PIN দুটো মিলছে না!'; return; }

  storedPin = n;
  localStorage.setItem('mn_pin', n);
  closePinChangeModal();
  showToast('PIN পরিবর্তন সফল হয়েছে 🔐');
}

// ===== HELPERS =====
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveData() {
  localStorage.setItem('mn_notes', JSON.stringify(notes));
  localStorage.setItem('mn_cats', JSON.stringify(categories));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টে','অক্টো','নভে','ডিসে'];
  const h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  const mm = m < 10 ? '0' + m : m;
  return `${d.getDate()} ${months[d.getMonth()]}, ${d.getFullYear()} ${hh}:${mm} ${ampm}`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modals on overlay click
['noteModal','viewModal','catModal','pinChangeModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});

// ===== INIT =====
initPin();
</script>
</body>
</html>
